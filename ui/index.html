<!doctype html>
<html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css"></head>
<body>
  <!-- ===== Barra superior ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="logo"></span><b>Music App</b><span class="sub">&middot; nombre provisional</span>
    </div>
    <div class="preset">
      <span class="ptag">PRESET</span><input id="preset-name" class="pinput" value="Default" autocomplete="off">
    </div>
    <div class="topright">
      <button class="tbtn" id="btn-save">Guardar</button>
      <div class="presetwrap">
        <button class="tbtn" id="btn-presets">Presets</button>
        <div class="presetpop" id="presets-pop" hidden></div>
      </div>
      <span class="t3k">&#9679; TONE3000</span>
      <button class="tbtn icon" id="btn-cfg">&#9881;</button>
    </div>
  </header>

  <!-- ===== Cuerpo: buscador + cadena ===== -->
  <div class="main">
    <aside class="browser">
      <div class="bhead"><b>Buscador de tonos</b><span class="t3klabel">TONE3000</span></div>
      <input class="search" id="search" placeholder="Buscar amps, pedales, IR..." autocomplete="off">
      <div class="chips">
        <span class="chip on">NAM</span><span class="chip">IR</span><span class="chip">A2</span>
        <span class="chip">A1</span><span class="chip">Amp</span><span class="chip">Pedal</span>
      </div>
      <div class="list" id="model-list"></div>
      <div class="bcount" id="model-count"></div>
    </aside>

    <section class="stage">
      <div class="stagehead">
        <span class="stitle">Cadena de senal</span>
        <span class="seriestoggle"><span class="seg on">Serie</span><span class="seg">Dual / Paralelo</span></span>
      </div>
      <div class="rack">
        <section class="block io">
          <div class="bh"><span>IN</span></div>
          <div class="kwrap"><div class="knob" id="k-in"></div><div class="klabel">GAIN</div><div class="kval" id="v-in">0.0 dB</div></div>
        </section>
        <div class="arrow"></div>

        <section class="block drive">
          <div class="bh"><span class="accent">PRE &middot; DRIVE</span><span class="toggle" id="drive-toggle">OFF</span></div>
          <div class="kwrap"><div class="knob" id="k-drv"></div><div class="klabel">DRIVE</div><div class="kval" id="v-drv">30%</div></div>
          <div class="kwrap"><div class="knob" id="k-lvl"></div><div class="klabel">LEVEL</div><div class="kval" id="v-lvl">70%</div></div>
        </section>
        <div class="arrow"></div>

        <section class="block amp">
          <div class="bh"><span class="accent">AMP &middot; NAM</span></div>
          <div class="loaded"><div class="lcap">MODELO CARGADO</div><div class="lname" id="amp-name">&mdash;</div></div>
          <div class="photo"><img id="amp-photo" src="amp-photo" alt=""></div>
        </section>
        <div class="arrow"></div>

        <section class="block cab">
          <div class="bh"><span class="accent">CAB &middot; IR</span><span class="toggle" id="ir-toggle">OFF</span></div>
          <div class="photo"><img id="cab-photo" src="cab-photo" alt=""></div>
          <div class="lname small" id="cab-name">&mdash;</div>
          <button class="change" id="cab-change">Cargar IR</button>
        </section>
        <div class="arrow"></div>

        <section class="block fx">
          <div class="bh"><span class="accent">POST &middot; REVERB</span></div>
          <div class="fxicon">&#8767;</div>
          <div class="kwrap"><div class="knob" id="k-rev"></div><div class="klabel">MIX</div><div class="kval" id="v-rev">0%</div></div>
        </section>
        <div class="arrow"></div>

        <section class="block io">
          <div class="bh"><span>OUT</span></div>
          <div class="kwrap"><div class="knob" id="k-out"></div><div class="klabel">MASTER</div><div class="kval" id="v-out">0.0 dB</div></div>
        </section>
      </div>
    </section>
  </div>

  <!-- ===== Barra inferior: medidores + afinador ===== -->
  <footer class="bottombar">
    <div class="meter"><span class="mlabel">IN</span><div class="mbar"><div class="mfill" id="in-fill"></div></div></div>
    <div class="tuner">
      <div class="tnote" id="t-note">&mdash;</div>
      <div class="tscale"><div class="tcenter"></div><div class="tneedle" id="t-needle"></div></div>
      <div class="thz" id="t-hz"></div>
    </div>
    <div class="meter"><span class="mlabel">OUT</span><div class="mbar"><div class="mfill" id="out-fill"></div></div></div>
  </footer>

  <script type="module" src="app.js"></script>
</body></html>
